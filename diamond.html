<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            
        }

        .diamond {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
        }

        span:nth-child(1) {
            position: absolute;
            top: 0;
            left: -2px;
            display: block;
            width: 5px;
            height: 5px;
            background: #999;
            transform: skew(-30deg);
            z-index: 2;
        }

        span:nth-child(1)::before {
            content: '';
            position: absolute;
            top: 100%;
            left: 60px;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 9px 0 111px 5px;
            border-color: #616161 transparent transparent transparent;
            transform: skewX(45deg);
        }

        span:nth-child(2) {
            position: absolute;
            top: 0;
            left: 1px;
            display: block;
            width: 8px;
            height: 5px;
            background: #666;
            z-index: 1;
        }

        span:nth-child(2)::before {
            content: '';
            position: absolute;
            top: 100%;
            left: -4px;
            width: 0;
            height: 0;
            border-top: 8px solid #333;
            border-left: 8px solid transparent;
            border-right: 7px solid transparent;
        }

        span:nth-child(3) {
            position: absolute;
            top: 0px;
            left: 7px;
            display: block;
            width: 5px;
            height: 5px;
            background: #999;
            transform: skew(30deg);
            z-index: 3;
        }

        span:nth-child(3)::before {
            content: '';
            position: absolute;
            top: 100%;
            left: -108px;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 9px 5px 207px 0px;
            border-color: #222 transparent transparent transparent;
            transform: skewX(-45deg);
        }

        span:nth-child(4) {
            position: absolute;
            top: -1px;
            left: 0px;
            display: block;
            width: 10px;
            height: 2px;
            border-radius: 50%;
            background: #888;
            z-index: 4;
        }
    </style>
</head>
<body>
    <div class="diamond">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>
</body>
</html>
